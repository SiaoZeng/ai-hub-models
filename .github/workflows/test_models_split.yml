name: Split Models for Testing

on:
  workflow_call:
    inputs:
      deployment:
        description: Hub Deployment
        default: prod
        type: string

      models:
        description: Models to run. Model names match folder names in `src/qai_hub_models/models`. Comma separated.
        type: string
        default: all

      test_devices:
        description: Test Devices
        default: default
        type: string

      test_runtimes:
        description: Test Runtimes
        default: default
        type: string

      test_precisions:
        description: Test Precisions
        default: default
        type: string

      qairt_version:
        description: Qualcomm AI Runtime Version
        type: string
        default: qaihm_default

      test_scope:
        # Options: unit, unit_and_compile, compile_only, perf, accuracy, perf_and_accuracy
        description: Test Scope
        type: string
        default: perf

      ignore_job_cache:
        description: Force run profile jobs
        default: true
        type: boolean

      ignore_known_failures:
        description: Ignore known failures (do not fail tests for models with known issues)
        default: true
        type: boolean

      max_models_per_split:
        description: Maximum number of PyTorch models per split when auto-splitting
        default: 30
        type: number

      max_num_splits:
        description: Maximum number of PyTorch model splits to create (0 = no limit)
        type: number
        default: 0

      sync_assets_branch:
        description: Branch containing synced static asset configs
        type: string
        default: ''

      python_version:
        description: Python version for artifact naming
        type: string
        default: '3.10'

      disable_override_workbench_job_timeout:
        description: Disable shorter workbench job timeout used for QAIHM PRs.
        default: false
        type: boolean

env:
  PYTHON_VERSION: ${{ inputs.python_version }}
  VENV_PATH: build/ci-envs/qaihm-build
  QAIHM_CI: 1

jobs:
  split_models:
    name: Split Models
    runs-on: [tetra-ubuntu-2204, self-hosted]
    outputs:
      matrix: ${{ steps.split.outputs.matrix }}
      needs_gpu_image: ${{ steps.split.outputs.needs_gpu_image }}
    steps:
      - uses: actions/checkout@v6

      - name: CI Setup
        uses: ./.github/actions/ci-setup
        with:
          sudo-password: ${{ secrets.TETRASERVICE_PASSWORD }}
          python-version: ${{ env.PYTHON_VERSION }}
          venv-path: ${{ env.VENV_PATH }}

      - name: Split Models
        id: split
        run: |
          source "${{ env.VENV_PATH }}/bin/activate"
          SPLIT_ARGS="--models ${{ inputs.models }} --max-models-per-pt-split ${{ inputs.max_models_per_split }} --stage job_submission"
          if [[ "${{ inputs.max_num_splits }}" != "0" ]]; then
            SPLIT_ARGS="$SPLIT_ARGS --max-num-pt-splits ${{ inputs.max_num_splits }}"
          fi
          MATRIX=$(python -m qai_hub_models.scripts.split_torch_models $SPLIT_ARGS --output-format github)
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          NUM_SPLITS=$(echo "$MATRIX" | python -c "import sys, json; print(len(json.load(sys.stdin)))")
          echo "num_splits=$NUM_SPLITS" >> "$GITHUB_OUTPUT"
          NEEDS_GPU=$(echo "$MATRIX" | python -c "import sys, json; splits=json.load(sys.stdin); print('true' if any((s.get('runs_on') or {}).get('group') == 'GPU' for s in splits) else 'false')")
          echo "needs_gpu_image=$NEEDS_GPU" >> "$GITHUB_OUTPUT"
          echo "Splits: $MATRIX"
          echo "Number of splits: $NUM_SPLITS"
          echo "Needs GPU image: $NEEDS_GPU"

  start_gpu_runner:
    name: Start Ephemeral GPU Runner
    needs: split_models
    if: ${{ needs.split_models.outputs.needs_gpu_image == 'true' }}
    runs-on: [tetra-ubuntu-2204, self-hosted]
    outputs:
      runner-label: ${{ steps.start.outputs.runner-label }}
      used_kube: 'true'
    steps:
      - uses: actions/checkout@v6

      # TODO: re-enable GPU node fallback once we have a stable check.
      # Always use Kube for now.
      # - name: Check GPU node availability
      #   id: check
      #   env:
      #     PAT_TOKEN: ${{ secrets.KUBE_GH_TOKEN }}
      #   run: |
      #     RUNNERS=$(curl -s \
      #       -H "Authorization: token $PAT_TOKEN" \
      #       -H "Accept: application/vnd.github+json" \
      #       "${{ github.api_url }}/repos/${{ github.repository }}/actions/runners?per_page=100")
      #     GPU_ONLINE=$(echo "$RUNNERS" | jq '[.runners[] | select(.labels[].name == "GPU") | select(.status == "online") | select(.busy == false)] | length')
      #     if [ "$GPU_ONLINE" -gt 0 ]; then
      #       echo "use_kube=false" >> "$GITHUB_OUTPUT"
      #     else
      #       echo "use_kube=true" >> "$GITHUB_OUTPUT"
      #     fi

      - name: Start Kube runner
        id: start
        uses: ./.github/actions/start-gpu-runner
        with:
          runner-id: gpu-pr-${{ github.run_id }}-${{ github.run_attempt }}
          gpu-request: "0"
          cpu-request: "8"
          memory-request: "256Gi"
          argo-namespace: "aihub-ci"
          kubeconfig: ${{ secrets.KUBECONFIG }}
          pat-token: ${{ secrets.KUBE_GH_TOKEN }}
          sudo-password: ${{ secrets.TETRASERVICE_PASSWORD }}

  start_jobs:
    name: Submit Jobs (${{ matrix.split.split_name }})
    needs: [split_models, start_gpu_runner]
    if: ${{ !cancelled() && needs.split_models.result == 'success' && (needs.start_gpu_runner.result == 'success' || needs.start_gpu_runner.result == 'skipped') }}
    permissions:
      contents: read
      id-token: write
      packages: read
    secrets: inherit
    strategy:
      matrix:
        split: ${{ fromJson(needs.split_models.outputs.matrix) }}
      fail-fast: false
    uses: ./.github/workflows/test_models.yml
    with:
      deployment: ${{ inputs.deployment }}
      models: ${{ matrix.split.models }}
      test_devices: ${{ inputs.test_devices }}
      test_runtimes: ${{ inputs.test_runtimes }}
      test_precisions: ${{ inputs.test_precisions }}
      qairt_version: ${{ inputs.qairt_version }}
      test_scope: ${{ inputs.test_scope }}
      ignore_job_cache: ${{ inputs.ignore_job_cache }}
      ignore_known_failures: ${{ inputs.ignore_known_failures }}
      split_name: ${{ matrix.split.split_name }}
      runs_on: ${{ matrix.split.runs_on.group == 'GPU' && format('["{0}"]', needs.start_gpu_runner.outputs.runner-label) || toJson(matrix.split.runs_on) }}
      sync_assets_branch: ${{ inputs.sync_assets_branch }}
      python_version: ${{ inputs.python_version }}
      disable_override_workbench_job_timeout: ${{ inputs.disable_override_workbench_job_timeout }}

  combine_artifacts:
    name: Combine Split Artifacts
    needs: [split_models, start_jobs]
    if: ${{ !cancelled() && needs.split_models.result == 'success' }}
    runs-on: [tetra-ubuntu-2204, self-hosted]
    steps:
      - uses: actions/checkout@v6

      - name: CI Setup
        uses: ./.github/actions/ci-setup
        with:
          sudo-password: ${{ secrets.TETRASERVICE_PASSWORD }}
          python-version: ${{ env.PYTHON_VERSION }}
          venv-path: ${{ env.VENV_PATH }}

      - name: Download All Split Artifacts
        if: ${{ inputs.test_scope != 'unit' }}
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ inputs.test_scope == 'unit_and_compile' && format('Test Cached Artifact (Flaky-Job-IDs, {0}, py{1}, *)', github.run_id, inputs.python_version) || format('Scorecard Cached Artifact (Flaky-Job-IDs, {0}, *)', github.run_id) }}
          path: build/split-artifacts

      - name: Combine Artifacts
        if: ${{ inputs.test_scope != 'unit' }}
        env:
          QAIHM_TEST_MODELS: ${{ inputs.models }}
        run: |
          source "${{ env.VENV_PATH }}/bin/activate"
          python -m qai_hub_models.scripts.combine_split_artifacts \
            --input-dir build/split-artifacts \
            --output-dir build/scorecard-yamls/${{ github.run_id }}

      - name: Upload Combined Artifacts
        if: ${{ inputs.test_scope != 'unit' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.test_scope == 'unit_and_compile' && format('Test Cached Artifact (Flaky-Job-IDs, {0}, py{1})', github.run_id, inputs.python_version) || format('Scorecard Cached Artifact (Flaky-Job-IDs, {0})', github.run_id) }}
          path: build/scorecard-yamls/${{ github.run_id }}

      - name: Delete Split Artifacts
        if: ${{ inputs.test_scope != 'unit' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARTIFACT_PREFIX="${{ inputs.test_scope == 'unit_and_compile' && format('Test Cached Artifact (Flaky-Job-IDs, {0}, py{1}, ', github.run_id, inputs.python_version) || format('Scorecard Cached Artifact (Flaky-Job-IDs, {0}, ', github.run_id) }}"
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts --paginate -q ".artifacts[] | select(.name | startswith(\"$ARTIFACT_PREFIX\")) | .id" | while read artifact_id; do
            echo "Deleting artifact $artifact_id"
            gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$artifact_id || true
          done

      - name: Download All Split Test Results
        id: download_test_results
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: ${{ (inputs.test_scope == 'unit' || inputs.test_scope == 'unit_and_compile') && format('test-results-models-py{0}-*', inputs.python_version) || 'test-results-scorecard-models-*' }}
          path: build/split-test-results

      - name: Combine JUnit XML Files
        id: combine_test_results
        if: ${{ steps.download_test_results.outcome == 'success' }}
        run: |
          source "${{ env.VENV_PATH }}/bin/activate"
          python scripts/combine_junit_xml.py \
            --junit-xml build/split-test-results \
            --output build/combined-test-results/qaihm-model-tests-junit.xml

      - name: Upload Combined Test Results
        if: ${{ steps.combine_test_results.outcome == 'success' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ (inputs.test_scope == 'unit' || inputs.test_scope == 'unit_and_compile') && format('test-results-models-py{0}', inputs.python_version) || 'test-results-scorecard-models' }}
          path: build/combined-test-results

      - name: Delete Split Test Results
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARTIFACT_PREFIX="${{ (inputs.test_scope == 'unit' || inputs.test_scope == 'unit_and_compile') && format('test-results-models-py{0}-', inputs.python_version) || 'test-results-scorecard-models-' }}"
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts --paginate -q ".artifacts[] | select(.name | startswith(\"$ARTIFACT_PREFIX\")) | .id" | while read artifact_id; do
            echo "Deleting artifact $artifact_id"
            gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$artifact_id || true
          done

  cleanup_gpu_runner:
    name: Cleanup GPU Runner
    needs: [start_gpu_runner, start_jobs]
    if: ${{ always() && needs.start_gpu_runner.outputs.used_kube == 'true' }}
    runs-on: [tetra-ubuntu-2204, self-hosted]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/stop-gpu-runner
        with:
          runner-ids: ${{ needs.start_gpu_runner.outputs.runner-label }}
          argo-namespace: "aihub-ci"
          kubeconfig: ${{ secrets.KUBECONFIG }}
          pat-token: ${{ secrets.KUBE_GH_TOKEN }}
          sudo-password: ${{ secrets.TETRASERVICE_PASSWORD }}
